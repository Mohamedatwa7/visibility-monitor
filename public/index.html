<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Samsung Visibility Monitor</title>
    <style>
      body { margin: 0; background: #f9fafb; }
      #root { min-height: 100vh; }
      .boot { font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; padding: 40px; color: #6b7280; }
    </style>
    <!-- React + Babel from CDN so we can render the canonical .jsx with no bundler/Next.js host. -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  </head>
  <body>
    <div id="root"><div class="boot">Loading dashboard…</div></div>
    <script>
      // The dashboard is normally a Next.js client component. Here we load the
      // SAME file (served at /dashboard.jsx) and transpile it in the browser, so
      // banner-monitor-dashboard.jsx remains the single source of truth.
      window.process = { env: { NEXT_PUBLIC_BANNER_API: location.origin } };

      (async () => {
        try {
          let code = await (await fetch('/dashboard.jsx')).text();
          // Strip the bits a browser/eval can't handle.
          code = code
            .replace(/^\s*['"]use client['"];?\s*$/m, '')
            .replace(/^\s*import\s+React[\s\S]*?from\s+['"]react['"];?\s*$/m, '')
            .replace(/export\s+default\s+function\s+BannerMonitorDashboard/, 'function BannerMonitorDashboard');

          const wrapped =
            'const { useCallback, useEffect, useMemo, useState } = React;\n' +
            code +
            '\nreturn BannerMonitorDashboard;';

          const transpiled = Babel.transform(wrapped, {
            presets: ['react'],
            parserOpts: { allowReturnOutsideFunction: true },
          }).code;
          const Comp = new Function('React', transpiled)(React);
          ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Comp));
        } catch (err) {
          document.getElementById('root').innerHTML =
            '<div class="boot">Failed to load dashboard: ' + (err && err.message) + '</div>';
          console.error(err);
        }
      })();
    </script>
  </body>
</html>
